name: Build Ndvideo

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch Ndless dependency
        id: ndless-source
        run: |
          if [ ! -d external/Ndless-official/.git ]; then
            rm -rf external/Ndless-official
            git clone --branch master https://github.com/ndless-nspire/Ndless.git external/Ndless-official
          fi
          git -C external/Ndless-official fetch --tags origin master
          git -C external/Ndless-official checkout master
          git -C external/Ndless-official reset --hard origin/master
          echo "sha=$(git -C external/Ndless-official rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            bison \
            flex \
            libboost-program-options-dev \
            libgmp-dev \
            libmpc-dev \
            libmpfr-dev \
            libtinfo-dev \
            python3-dev \
            texinfo \
            xz-utils \
            zlib1g-dev

      - name: Cache Ndless ARM toolchain
        uses: actions/cache@v4
        id: ndless-toolchain-cache
        with:
          path: external/Ndless-official/ndless-sdk/toolchain/install
          key: ${{ runner.os }}-ndless-toolchain-${{ steps.ndless-source.outputs.sha }}-${{ hashFiles('external/Ndless-official/ndless-sdk/toolchain/build_toolchain.sh') }}

      - name: Build Ndless ARM toolchain
        if: steps.ndless-toolchain-cache.outputs.cache-hit != 'true'
        working-directory: external/Ndless-official/ndless-sdk/toolchain
        run: PARALLEL="-j$(nproc)" ./build_toolchain.sh

      - name: Add Ndless toolchain to PATH
        run: |
          echo "$GITHUB_WORKSPACE/external/Ndless-official/ndless-sdk/toolchain/install/bin" >> "$GITHUB_PATH"
          echo "$GITHUB_WORKSPACE/external/Ndless-official/ndless-sdk/bin" >> "$GITHUB_PATH"

      - name: Build ndvideo
        run: make SDKROOT=./external/Ndless-official/ndless-sdk

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ndvideo-${{ github.sha }}
          path: |
            dist/ndvideo.tns
            dist/ndvideo.zehn
            dist/ndvideo.elf
          if-no-files-found: error
