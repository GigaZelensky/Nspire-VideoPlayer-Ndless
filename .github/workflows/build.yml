name: Build Ndvideo

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch Ndless dependency
        id: ndless-source
        run: |
          if [ ! -d external/Ndless-official/.git ]; then
            rm -rf external/Ndless-official
            git clone --branch master https://github.com/ndless-nspire/Ndless.git external/Ndless-official
          fi
          git -C external/Ndless-official fetch --tags origin master
          git -C external/Ndless-official checkout master
          git -C external/Ndless-official reset --hard origin/master
          echo "sha=$(git -C external/Ndless-official rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            binutils-arm-none-eabi \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            python3 \
            zlib1g-dev

      - name: Add Ndless toolchain to PATH
        run: |
          echo "$GITHUB_WORKSPACE/external/Ndless-official/ndless-sdk/bin" >> "$GITHUB_PATH"
          echo "_NDLESS_TOOLCHAIN_PATH=/usr/local/bin:/usr/bin" >> "$GITHUB_ENV"
          if [ ! -x /usr/bin/arm-none-eabi-ld.gold ] && [ -x /usr/bin/arm-none-eabi-ld ]; then
            sudo ln -sf /usr/bin/arm-none-eabi-ld /usr/local/bin/arm-none-eabi-ld.gold
          fi

      - name: Build ndvideo
        run: make SDKROOT=./external/Ndless-official/ndless-sdk

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ndvideo-${{ github.sha }}
          path: |
            dist/ndvideo.tns
            dist/ndvideo.zehn
            dist/ndvideo.elf
          if-no-files-found: error
